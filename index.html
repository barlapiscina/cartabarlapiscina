<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bar La Piscina · Barcarrota</title>

<!-- Supabase JS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<!-- Fuentes -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kaushan+Script&family=Kalam:wght@400;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root{
    --teal-dark:#0e5a5c;
    --teal-mid:#3fa9a3;
    --teal-light:#a8e6df;
    --sun-yellow:#ffcf3f;
    --cream:#fffdf6;
    --ink:#123638;
    --line:#d98f2b;
  }

  *{ box-sizing:border-box; }

  html{
    background-color:var(--teal-dark);
  }

  html,body{
    margin:0; padding:0;
    font-family:'Poppins', sans-serif;
    color:var(--ink);
    min-height:100vh;
  }

  .bg-photo{
    position:fixed;
    top:0; left:0;
    width:100%;
    height:auto;
    z-index:-2;
    display:block;
  }

  .bg-tint{
    position:fixed;
    inset:0;
    background:linear-gradient(rgba(6,30,31,.62), rgba(6,30,31,.72));
    z-index:-1;
  }

  header{
    height:40vh;
    min-height:280px;
  }

  @media (max-width:600px){
    header{
      height:34vh;
      min-height:230px;
    }
  }

  @media (max-width:380px){
    header{
      height:30vh;
      min-height:200px;
    }
  }

  main{
    max-width:820px;
    margin:0 auto;
    padding:24px 18px 60px;
  }

  section.category{
    margin-bottom:32px;
  }

  h3.category-title{
    font-family:'Kaushan Script', cursive;
    color:var(--sun-yellow);
    font-size:1.9rem;
    border-bottom:3px solid var(--line);
    padding-bottom:6px;
    margin-bottom:16px;
    text-shadow:1px 1px 0 var(--teal-dark), 0 0 10px rgba(0,0,0,.5);
  }

  ul.items{
    list-style:none;
    margin:0; padding:0;
  }
  li.item{
    font-family:'Kalam', cursive;
    font-size:1.15rem;
    color:var(--ink);
    background:rgba(255,253,246,.92);
    border-radius:10px;
    padding:10px 14px;
    margin-bottom:8px;
    box-shadow:0 2px 10px rgba(0,0,0,.25);
  }
  li.item .top-line{
    display:flex;
    align-items:baseline;
    gap:8px;
  }
  li.item .name{ font-weight:700; }
  li.item .dots{
    flex:1;
    border-bottom:2px dotted var(--teal-dark);
    height:0;
    transform:translateY(-4px);
    min-width:20px;
  }
  li.item .price{
    font-weight:700;
    color:var(--teal-dark);
    white-space:nowrap;
  }
  li.item .desc{
    display:block;
    font-size:.85rem;
    font-style:italic;
    color:#3a5f60;
    margin:2px 0 4px;
  }

  .empty, .loading{
    text-align:center;
    color:var(--cream);
    font-family:'Kalam', cursive;
    font-size:1.1rem;
    padding:30px 0;
    text-shadow:0 2px 6px rgba(0,0,0,.6);
  }

</style>
</head>
<body>

<img class="bg-photo" src="fondo.png" alt="">
<div class="bg-tint"></div>

<header></header>

<main id="menuMain">
  <p class="loading">Cargando la carta… 🌊</p>
</main>

<script>
  // ======================================================
  // CONFIGURACIÓN DE SUPABASE — rellena estos dos valores
  // (Project Settings → API en tu proyecto de Supabase)
  // ======================================================
  const SUPABASE_URL = 'https://sfbftsrwhjbrrxgagpjs.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_g4PAyzDnk2FU6e7wbHhUGg_qmZYpYeS';

  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // Orden preferido de categorías (si una categoría nueva no está aquí, se añade al final)
  const CATEGORY_ORDER = [
    'Tapas', 'Raciones', 'Hamburguesas', 'Bocadillos', 'Children', 'Merienda', 'Patatas', 'Postre'
  ];

  function formatPrice(p){
    const n = Number(p);
    return n.toLocaleString('es-ES', { minimumFractionDigits: n % 1 === 0 ? 0 : 2, maximumFractionDigits: 2 }) + '€';
  }

  function groupByCategory(products){
    const map = {};
    products.forEach(p => {
      if(!map[p.category]) map[p.category] = [];
      map[p.category].push(p);
    });
    return map;
  }

  function orderedCategories(map){
    const known = CATEGORY_ORDER.filter(c => map[c]);
    const rest = Object.keys(map).filter(c => !CATEGORY_ORDER.includes(c)).sort();
    return [...known, ...rest];
  }

  function renderMenu(products){
    const main = document.getElementById('menuMain');
    main.innerHTML = '';

    if(!products.length){
      main.innerHTML = '<p class="empty">Aún no hay productos cargados en la carta.</p>';
      return;
    }

    const grouped = groupByCategory(products);
    const cats = orderedCategories(grouped);

    cats.forEach((cat) => {
      // sección
      const section = document.createElement('section');
      section.className = 'category';
      section.id = 'cat-' + cat;

      const title = document.createElement('h3');
      title.className = 'category-title';
      title.textContent = cat;
      section.appendChild(title);

      const ul = document.createElement('ul');
      ul.className = 'items';

      grouped[cat]
        .sort((a,b) => (a.sort_order ?? 0) - (b.sort_order ?? 0))
        .forEach(p => {
          const li = document.createElement('li');
          li.className = 'item';
          li.innerHTML = `
            <span class="name">${p.name}</span>
            ${p.description ? `<span class="desc">${p.description}</span>` : ''}
            <div class="top-line">
              <span class="dots"></span>
              <span class="price">${formatPrice(p.price)}</span>
            </div>
          `;
          ul.appendChild(li);
        });

      section.appendChild(ul);
      main.appendChild(section);
    });
  }

  async function loadMenu(){
    const { data, error } = await supabaseClient
      .from('products')
      .select('*')
      .eq('active', true);

    if(error){
      document.getElementById('menuMain').innerHTML =
        `<p class="empty">No se pudo cargar la carta. Revisa la configuración de Supabase.<br><small>${error.message}</small></p>`;
      console.error(error);
      return;
    }
    renderMenu(data || []);
  }

  loadMenu();
</script>

</body>
</html>
