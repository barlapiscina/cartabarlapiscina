<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bar La Piscina · Barcarrota</title>

<!-- Supabase JS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<!-- Fuentes -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kaushan+Script&family=Kalam:wght@400;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root{
    --teal-dark:#0e5a5c;
    --teal-mid:#3fa9a3;
    --teal-light:#a8e6df;
    --sun-yellow:#ffcf3f;
    --cream:#fffdf6;
    --ink:#123638;
    --line:#d98f2b;
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0; padding:0;
    font-family:'Poppins', sans-serif;
    color:var(--ink);
    background:
      radial-gradient(circle at 90% 0%, rgba(255,207,63,.25), transparent 40%),
      linear-gradient(180deg, var(--teal-dark) 0%, var(--teal-mid) 45%, var(--teal-light) 100%);
    min-height:100vh;
  }

  /* Gotas de agua flotantes decorativas */
  .drop{
    position:fixed;
    width:14px; height:18px;
    background:var(--cream);
    opacity:.35;
    border-radius:0 50% 50% 50%;
    transform:rotate(45deg);
    animation:float 6s ease-in-out infinite;
    pointer-events:none;
  }
  @keyframes float{
    0%,100%{ transform:rotate(45deg) translateY(0); }
    50%{ transform:rotate(45deg) translateY(-14px); }
  }
  @media (prefers-reduced-motion: reduce){ .drop{ animation:none; } }

  header{
    position:relative;
    padding:28px 16px 18px;
    text-align:center;
    overflow:hidden;
  }

  .logos{
    display:flex;
    justify-content:space-between;
    align-items:center;
    max-width:1000px;
    margin:0 auto 8px;
    gap:12px;
  }
  .logo-badge{
    background:rgba(255,255,255,.65);
    border-radius:10px;
    padding:6px 14px;
    font-family:'Kaushan Script', cursive;
    font-size:1.05rem;
    color:var(--teal-dark);
    box-shadow:0 2px 8px rgba(0,0,0,.12);
    white-space:nowrap;
  }
  .logo-badge small{
    display:block;
    font-family:'Poppins',sans-serif;
    font-size:.55rem;
    letter-spacing:.08em;
    color:var(--ink);
    font-weight:600;
  }

  .sun{
    width:46px; height:46px;
    margin:6px auto 0;
    display:block;
    animation:spin 24s linear infinite;
  }
  @media (prefers-reduced-motion: reduce){ .sun{ animation:none; } }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  h1.brand{
    font-family:'Kaushan Script', cursive;
    color:var(--sun-yellow);
    text-shadow: 2px 2px 0 var(--teal-dark), -1px -1px 0 rgba(255,255,255,.5);
    font-size:clamp(2.4rem, 8vw, 4.2rem);
    margin:0;
    line-height:1;
  }
  h2.brand-sub{
    font-family:'Kaushan Script', cursive;
    color:var(--cream);
    font-size:clamp(1.6rem, 5vw, 2.4rem);
    margin:2px 0 0;
    -webkit-text-stroke:1px var(--teal-dark);
  }

  main{
    max-width:820px;
    margin:0 auto;
    padding:24px 18px 60px;
  }

  section.category{
    margin-bottom:32px;
  }

  h3.category-title{
    font-family:'Kaushan Script', cursive;
    color:var(--cream);
    font-size:1.9rem;
    border-bottom:3px solid var(--line);
    padding-bottom:6px;
    margin-bottom:16px;
    text-shadow:1px 1px 0 var(--teal-dark);
  }

  ul.items{
    list-style:none;
    margin:0; padding:0;
  }
  li.item{
    font-family:'Kalam', cursive;
    font-size:1.15rem;
    color:var(--ink);
    background:rgba(255,253,246,.55);
    border-radius:10px;
    padding:10px 14px;
    margin-bottom:8px;
  }
  li.item .top-line{
    display:flex;
    align-items:baseline;
    gap:8px;
  }
  li.item .name{ font-weight:700; }
  li.item .dots{
    flex:1;
    border-bottom:2px dotted var(--teal-dark);
    height:0;
    transform:translateY(-4px);
    min-width:20px;
  }
  li.item .price{
    font-weight:700;
    color:var(--teal-dark);
    white-space:nowrap;
  }
  li.item .desc{
    display:block;
    font-size:.85rem;
    font-style:italic;
    color:#3a5f60;
    margin:2px 0 4px;
  }

  .empty, .loading{
    text-align:center;
    color:var(--cream);
    font-family:'Kalam', cursive;
    font-size:1.1rem;
    padding:30px 0;
  }

</style>
</head>
<body>

<!-- gotas decorativas -->
<div class="drop" style="top:12%; left:6%; animation-delay:0s;"></div>
<div class="drop" style="top:30%; left:88%; animation-delay:1.2s;"></div>
<div class="drop" style="top:70%; left:12%; animation-delay:2.4s;"></div>
<div class="drop" style="top:55%; left:80%; animation-delay:.6s;"></div>

<header>
  <div class="logos">
    <div class="logo-badge">Bar La Piscina<small>BARCARROTA</small></div>
    <div class="logo-badge">Bar Eloy<small>TÁLIGA</small></div>
  </div>

  <svg class="sun" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <circle cx="50" cy="50" r="18" fill="#ffcf3f"/>
    <g stroke="#ffcf3f" stroke-width="6" stroke-linecap="round">
      <line x1="50" y1="2" x2="50" y2="16"/>
      <line x1="50" y1="84" x2="50" y2="98"/>
      <line x1="2" y1="50" x2="16" y2="50"/>
      <line x1="84" y1="50" x2="98" y2="50"/>
      <line x1="14" y1="14" x2="24" y2="24"/>
      <line x1="76" y1="76" x2="86" y2="86"/>
      <line x1="14" y1="86" x2="24" y2="76"/>
      <line x1="76" y1="24" x2="86" y2="14"/>
    </g>
  </svg>

  <h1 class="brand">Bar La Picina</h1>
  <h2 class="brand-sub">Barcarrota</h2>
</header>

<main id="menuMain">
  <p class="loading">Cargando la carta… 🌊</p>
</main>

<script>
  // ======================================================
  // CONFIGURACIÓN DE SUPABASE — rellena estos dos valores
  // (Project Settings → API en tu proyecto de Supabase)
  // ======================================================
  const SUPABASE_URL = 'https://sfbftsrwhjbrrxgagpjs.supabase.co'; 
  const SUPABASE_ANON_KEY = 'sb_publishable_g4PAyzDnk2FU6e7wbHhUGg_qmZYpYeS';

  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // Orden preferido de categorías (si una categoría nueva no está aquí, se añade al final)
  const CATEGORY_ORDER = [
    'Tapas', 'Raciones', 'Hamburguesas', 'Bocadillos', 'Children', 'Merienda', 'Patatas', 'Postre'
  ];

  function formatPrice(p){
    const n = Number(p);
    return n.toLocaleString('es-ES', { minimumFractionDigits: n % 1 === 0 ? 0 : 2, maximumFractionDigits: 2 }) + '€';
  }

  function groupByCategory(products){
    const map = {};
    products.forEach(p => {
      if(!map[p.category]) map[p.category] = [];
      map[p.category].push(p);
    });
    return map;
  }

  function orderedCategories(map){
    const known = CATEGORY_ORDER.filter(c => map[c]);
    const rest = Object.keys(map).filter(c => !CATEGORY_ORDER.includes(c)).sort();
    return [...known, ...rest];
  }

  function renderMenu(products){
    const main = document.getElementById('menuMain');
    main.innerHTML = '';

    if(!products.length){
      main.innerHTML = '<p class="empty">Aún no hay productos cargados en la carta.</p>';
      return;
    }

    const grouped = groupByCategory(products);
    const cats = orderedCategories(grouped);

    cats.forEach((cat) => {
      // sección
      const section = document.createElement('section');
      section.className = 'category';
      section.id = 'cat-' + cat;

      const title = document.createElement('h3');
      title.className = 'category-title';
      title.textContent = cat;
      section.appendChild(title);

      const ul = document.createElement('ul');
      ul.className = 'items';

      grouped[cat]
        .sort((a,b) => (a.sort_order ?? 0) - (b.sort_order ?? 0))
        .forEach(p => {
          const li = document.createElement('li');
          li.className = 'item';
          li.innerHTML = `
            <span class="name">${p.name}</span>
            ${p.description ? `<span class="desc">${p.description}</span>` : ''}
            <div class="top-line">
              <span class="dots"></span>
              <span class="price">${formatPrice(p.price)}</span>
            </div>
          `;
          ul.appendChild(li);
        });

      section.appendChild(ul);
      main.appendChild(section);
    });
  }

  async function loadMenu(){
    const { data, error } = await supabaseClient
      .from('products')
      .select('*')
      .eq('active', true);

    if(error){
      document.getElementById('menuMain').innerHTML =
        `<p class="empty">No se pudo cargar la carta. Revisa la configuración de Supabase.<br><small>${error.message}</small></p>`;
      console.error(error);
      return;
    }
    renderMenu(data || []);
  }

  loadMenu();
</script>

</body>
</html>
